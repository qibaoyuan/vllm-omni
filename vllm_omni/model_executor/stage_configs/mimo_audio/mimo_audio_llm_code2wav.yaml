# stage config for running qwen2.5-omni with architecture of OmniLLM.
stage_args:
  - stage_id: 0
    runtime:
      process: true            # Run this stage in a separate process
      devices: "0"            # Visible devices for this stage (CUDA_VISIBLE_DEVICES/torch.cuda.set_device)
      max_batch_size: 1
    engine_args:
      model_stage: llm
      dtype: bfloat16
      model_arch: MiMoAudioForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.scheduler.OmniScheduler
      gpu_memory_utilization: 0.85
      enforce_eager: true  # need to discuss
      trust_remote_code: true
      engine_output_type: latent  # change the param name,such as pooling_output
      max_model_len: 1800
      max_num_batched_tokens: 1800
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 256
      seed: 42
      detokenize: True
      repetition_penalty: 1.1

  - stage_id: 1
    runtime:
      process: true            # Run this stage in a separate process
      devices: "1"            # Visible devices for this stage (CUDA_VISIBLE_DEVICES/torch.cuda.set_device)
      max_batch_size: 1
    engine_args:
      model_stage: code2wav
      model_arch: MiMoAudioForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_diffusion_worker.GPUDiffusionWorker
      scheduler_cls: vllm_omni.core.sched.diffusion_scheduler.DiffusionScheduler
      gpu_memory_utilization: 0.6
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      engine_output_type: audio
      max_model_len: 8192
      max_num_batched_tokens: 8192
    engine_input_source: [0]
    is_comprehension: false
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.mimo_audio.llm2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 8192
      seed: 42
      detokenize: false
